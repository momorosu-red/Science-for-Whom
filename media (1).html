<style>
  :root{
    --ink:#053C5E; --ink-soft:#3d6a86; --paper:#BFDBF7; --paper-card:#FFFFFF;
    --line:rgba(5,60,94,0.14);
  }
  *{ box-sizing:border-box; }
  body{ margin:0; background:var(--paper); color:var(--ink); font-family:'Source Sans 3',sans-serif; line-height:1.6; }
  .wrap{ max-width:760px; margin:0 auto; padding:64px 32px 100px; }
  .back{
    font-family:'Space Mono',monospace; font-size:12.5px; text-decoration:none; color:var(--ink-soft);
    display:inline-flex; align-items:center; gap:6px; margin-bottom:32px;
  }
  .back:hover{ color:var(--ink); }
  .tag{
    display:inline-flex; font-family:'Space Mono',monospace; font-size:11px; letter-spacing:.08em;
    text-transform:uppercase; color:#FFFFFF; padding:5px 14px; border-radius:999px; margin-bottom:18px;
  }
  h1{ font-family:'Fraunces',serif; font-weight:600; font-size:clamp(30px,4.5vw,44px); margin:0 0 20px; line-height:1.1; }
  .summary{ font-family:'Fraunces',serif; font-style:italic; font-size:19px; color:var(--ink-soft); margin:0 0 20px; }
  .body-text{ font-size:16px; margin:0 0 44px; max-width:640px; }
  .media-section h2{
    font-family:'Space Mono',monospace; font-size:12px; letter-spacing:.1em; text-transform:uppercase;
    color:var(--ink-soft); margin:0 0 18px; border-top:1px solid var(--line); padding-top:28px;
  }
  .media-empty{
    background:var(--paper-card); border:1px dashed var(--line); border-radius:6px;
    padding:28px 26px; font-size:14.5px; color:var(--ink-soft); font-family:'Space Mono',monospace;
  }
  .start-here{
    background:var(--ink); color:#fff; border-radius:8px; padding:22px 24px; margin-bottom:32px;
  }
  .start-here .m-eyebrow{ font-family:'Space Mono',monospace; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#F4C430; margin-bottom:8px; }
  .start-here a{ color:#fff; }
  .start-here .m-title{ font-family:'Fraunces',serif; font-weight:600; font-size:19px; }
  .bucket{ margin-bottom:36px; }
  .diagram-box{ background:var(--paper-card); border:1px solid var(--line); border-radius:8px; padding:20px; overflow-x:auto; }
  .diagram-box svg{ width:100%; height:auto; display:block; }
  .bucket h3{
    font-family:'Space Mono',monospace; font-size:11.5px; letter-spacing:.1em; text-transform:uppercase;
    color:var(--ink-soft); margin:0 0 14px; display:flex; align-items:center; gap:8px;
  }
  .bucket h3 .icon{ font-size:13px; }
  .media-list{ display:grid; gap:12px; }
  .media-item{
    background:var(--paper-card); border:1px solid var(--line); border-radius:6px; padding:16px 18px;
    text-decoration:none; color:var(--ink); display:flex; align-items:baseline; gap:10px;
  }
  .media-item:hover{ border-color:var(--ink-soft); }
  .media-item .m-icon{ font-size:14px; flex:none; }
  .media-item .m-title{ font-family:'Fraunces',serif; font-weight:600; font-size:15.5px; line-height:1.3; }
  .media-item .m-meta{ font-family:'Space Mono',monospace; font-size:11px; color:var(--ink-soft); margin-top:3px; }
  .show-more{
    font-family:'Space Mono',monospace; font-size:12px; color:var(--ink-soft); background:none;
    border:1px solid var(--line); border-radius:999px; padding:6px 14px; cursor:pointer; margin-top:4px;
  }
  .show-more:hover{ color:var(--ink); border-color:var(--ink-soft); }
  .hidden-item{ display:none; }
  .notfound{ font-family:'Space Mono',monospace; font-size:14px; color:var(--ink-soft); }
</style>
</head>

<script>
const GROUPS = [
  { id:'define',   name:'Science, Defined',            color:'#1F7A8C' },
  { id:'legacy',    name:"Science's Origin Story",           color:'#A31621' },
  { id:'barriers',  name:'The Walled World',   color:'#DB222A' },
  { id:'engage',    name:'Engaging with Science',       color:'#053C5E' },
  { id:'crisis',    name:'The Polycrisis',              color:'#14505C' },
  { id:'responsible', name:'Science With Integrity', color:'#3B7CA6' },
];
const LEAVES = [
  // DEFINING SCIENCE
  { id:'d1', group:'define', r:54, label:'What Is Science?', summary:"The pursuit and application of knowledge through systematic, evidence-based methodology — but who practices it, who funds it, is the real question.",
    body:"The Science Council defines science as the pursuit and application of knowledge and understanding of the natural and social world, following a systematic methodology based on evidence. That definition doesn't settle much on its own — it just opens the real questions: who practices it, what motivates it, who funds it, and whether it's neutral at all.", media:[] },
  { id:'d2', group:'define', r:34, label:'Is Science Neutral?', summary:"Science is trusted as a tool for the public good — which is exactly why its neutrality has to be examined, not assumed.",
    body:"Science is funded and trusted to serve the public good, and scientists hold a uniquely powerful role in that process. Trust of that scale is precisely what makes the assumption of neutrality worth interrogating rather than taking for granted.", media:[
      { type:'article', url:'https://www.nature.com/articles/s41562-024-02090-5', title:'Trust in scientists and their role in society across 68 countries', primary:true },
      { type:'data', url:'https://www.ipsos.com/en-ca/ipsos-global-trustworthiness-index-2024', title:'2024 Ipsos Global Trustworthiness Index', author:'Ipsos', year:'2024' },
      { type:'article', url:'https://www.nature.com/articles/s41562-025-02147-z', title:'Political ideology and trust in scientists in the USA', year:'2025' },
      { type:'article', url:'https://www.sciencedirect.com/science/article/pii/S003936811730208X', title:'Scientists as experts: A distinct role?' },
      { type:'book', url:'https://www.torrossa.com/en/resources/an/5576082', title:'Science as Social Knowledge: Values and Objectivity in Scientific Inquiry', author:'Longino' }
    ] },
  { id:'d3', group:'define', r:36, label:'The Right to Science', summary:"Article 27 of the UN Declaration of Human Rights (1948) enshrined the right to share in scientific advancement.",
    body:"\"Everyone has the right ... to share in scientific advancement and its benefits.\" In practice, enforcement is weak, and access to that right remains deeply uneven — not all people participate in generating scientific knowledge, and not all people benefit from it.", media:[] },
  { id:'d4', group:'define', r:30, label:'Positionality', summary:"An individual's worldview shapes their research — whether they name it or not.",
    body:"Positionality is the way an individual's worldview — and therefore their perceptions and research activities — is shaped by the frameworks and sociopolitical context within which they live (Secules et al., 2020).", media:[] },
  { id:'d5', group:'define', r:28, label:'The Privilege of Access', summary:"Science students sit among the people with the highest access to knowledge in the world.",
    body:"At McGill alone, students have access to 1,541 databases of online knowledge. With the ability to access and understand information at that scale comes real power — and a duty to wield it in ways that benefit the public, not just careers.", media:[] },

  // LEGACY OF SCIENCE
  { id:'l1', group:'legacy', r:54, label:'Science Was Never Neutral', summary:"From the start, science has been an extension of colonialism.",
    body:"Colonialism: acquiring political control over another country, occupying it with settlers, and exploiting it economically. Coloniality: the enduring structures of power that outlasted formal colonial rule. Science was repeatedly built to serve — and justify — both.", media:[] },
  { id:'l2', group:'legacy', r:36, label:'Statistics, Born From Eugenics', summary:"Some of the field's founding tools were built to prove racial hierarchy.",
    body:"Francis Galton, a \"founding father\" of statistics, imagined separate bell curves for different races. Karl Pearson, \"founding father of biometrics,\" used statistics to give eugenics the appearance of mathematical fact, framing war against \"inferior races\" as a logical implication of evolution. Ronald Fisher supported the sterilization of the \"feeble-minded.\" The eugenics movement laid real groundwork for modern genetics.", media:[] },
  { id:'l3', group:'legacy', r:32, label:'The First Epidemiologists', summary:"Many surveillance tools were developed studying enslaved people.",
    body:"Tools now used to control pandemics — observation, surveillance, data collection — were developed by physicians aboard slave ships and in colonial regimes, who \"studied\" disease progression among enslaved Africans held in deliberately crowded, unsanitary conditions.", media:[] },
  { id:'l4', group:'legacy', r:32, label:'Epistemic Injustice', summary:"When people are wronged specifically as knowers.",
    body:"Testimonial injustice dismisses someone's credibility due to bias. Hermeneutical injustice denies them the frameworks to interpret their own experience. Epistemicide is the intentional destruction of an entire knowledge system — as happened to Indigenous knowledge systems in Canada.", media:[] },
  { id:'l5', group:'legacy', r:28, label:'Global North / Global South', summary:"Even our vocabulary for inequality is colonially constructed.",
    body:"\"First World / Third World\" and \"Developed / Developing\" imply that some countries are simply ahead and others behind — a racial hierarchy in disguise. \"Global North / South\" at least names a division of wealth and power, rather than of worth.", media:[] },

  // BARRIERS TO PARTICIPATION
  { id:'b1', group:'barriers', r:54, label:'Barriers Sustained by Coloniality', summary:"Infrastructure, geopolitics, money, language, and violence all still gate participation in science.",
    body:"These barriers aren't incidental — they're sustained by the same colonial structures that produced today's distribution of scientific capital and infrastructure.", media:[] },
  { id:'b2', group:'barriers', r:32, label:'Infrastructure', summary:"85% of the world's population, 50–80% of the infrastructure access.",
    body:"Despite hosting 85% of the global population, Global South countries have only 50–80% of the infrastructure access, while experiencing 9–44% higher inequalities compared with the Global North (Tu et al., 2025).", media:[] },
  { id:'b3', group:'barriers', r:32, label:'Geopolitical: Visas & Politics', summary:"Visa bans don't just upend careers — they restrict who reaches funded institutions.",
    body:"\"The visa bans and delays promise not only to upend the careers of international students but also to cause drastic economic impacts to the United States\" (Gewin). Political interference compounds this — recent executive actions gave political appointees authority over nearly $200 billion in US science funding (Garisto et al., 2025).", media:[] },
  { id:'b4', group:'barriers', r:30, label:'Financial', summary:"Grants mostly go to those who've already published in high-impact journals.",
    body:"\"Grants are mostly awarded to those who have already published in high-impact journals\" (Petersen). Unpaid internships, self-funded conferences, and underpaid postdoc positions disproportionately exclude those without generational wealth (McClain, 2025).", media:[] },
  { id:'b5', group:'barriers', r:28, label:'Language', summary:"Over 90% of science is published in a language 20% of the world speaks.",
    body:"More than 75% of articles in the social sciences and over 90% in the natural sciences are written in English (Hamel, 2007) — costing the field diversity of thought and overlooking critical data from non-English speakers.", media:[] },
  { id:'b6', group:'barriers', r:24, label:'Violence & Conflict', summary:"It's hard to publish a paper from a warzone.",
    body:"Destruction and conflict remove the basic conditions — safety, infrastructure, continuity — that research depends on, and are rarely counted among the standard \"barriers to science.\"", media:[] },

  // ENGAGING WITH SCIENCE
  { id:'e1', group:'engage', r:54, label:'Where Science Happens', summary:"Prestige, funding, patents, and publish-or-perish all concentrate in the Global North.",
    body:"Publishing, patents, R&D spending, and academic prestige remain concentrated in high-income countries — shaping which questions get pursued and who gets credit for answering them.", media:[] },
  { id:'e2', group:'engage', r:32, label:'Publish or Perish', summary:"99% of first authorships are concentrated in the Global North.",
    body:"\"Publishing in prestigious journals is still thought to be the most important element in determining whether researchers gain funding, jobs and promotions\" (Leyser, 2014) — so scientists work within a system built on the Global North even when their goal is to change it.", media:[] },
  { id:'e3', group:'engage', r:30, label:'Patents & Funding', summary:"Intellectual property is just as concentrated as publishing.",
    body:"Patents and R&D spending as a share of GDP cluster in the same handful of wealthy countries — leaving drug discovery for diseases endemic to the Global South chronically underfunded, since development still tracks profit.", media:[] },
  { id:'e4', group:'engage', r:32, label:'Vaccine Nationalism', summary:"Countries invest in themselves first, and hoard the rest.",
    body:"Wealthy nations secured hundreds of millions of vaccine doses per capita while opposing the TRIPS waiver — leaving countries dependent on charity-model access without local manufacturing or supply.", media:[] },
  { id:'e5', group:'engage', r:30, label:'Whose Data Trains the Machine', summary:"LLMs trained on majority-English data miss the populations they under-represent.",
    body:"\"If data is not representative of a given population, then the outcome of the decision system for that subpopulation may not be trustworthy\" — and light skin tone is overrepresented in 3 of 4 medical textbooks (Louie & Wilkes, 2018), a bias that compounds when that data trains medical AI (Cross et al., 2024).", media:[] },
  { id:'e6', group:'engage', r:28, label:'White Saviorism in Global Health', summary:"85% of global health organizations are headquartered in Europe and North America.",
    body:"Global health research is often conducted by the Global North, about the Global South — leaving the benefits of publication somewhere far from the communities the research actually studies (Banerjee et al., 2023).", media:[] },

  // THE POLYCRISIS
  { id:'c1', group:'crisis', r:54, label:'A World of Compounding Crises', summary:"AI, climate, AMR, pandemics, and disinformation aren't separate problems.",
    body:"Climate change, antimicrobial resistance, mental health, renewable energy, infrastructure collapse, and disinformation compound each other rather than sitting in isolation — a polycrisis that demands scientists trained to see the connections, not just the disciplines. The ideal model of knowledge translation runs cleanly from science to evidence to policy to practice to real health impact. In reality, each of those steps is its own gap — a place where good research quietly stalls, gets diluted, or never arrives at all.", media:[
      { type:'diagram', title:'The gaps in knowledge translation',
        caption:'The textbook version of this pipeline is a smooth line. The real version has a gap at every step.',
        svg:'<svg viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg"><defs><style>.kt-label{font-family:\'Source Sans 3\',sans-serif;font-size:15px;font-weight:600;fill:#053C5E;} .kt-gap{font-family:\'Space Mono\',monospace;font-size:11px;fill:#A31621;letter-spacing:.04em;text-transform:uppercase;}</style></defs>' +
          '<circle cx="90" cy="100" r="70" fill="#BFDBF7" stroke="#053C5E" stroke-width="2"/><text x="90" y="96" text-anchor="middle" class="kt-label">Science &amp;</text><text x="90" y="114" text-anchor="middle" class="kt-label">research</text>' +
          '<circle cx="270" cy="100" r="70" fill="#BFDBF7" stroke="#053C5E" stroke-width="2"/><text x="270" y="105" text-anchor="middle" class="kt-label">Evidence</text>' +
          '<circle cx="450" cy="100" r="70" fill="#BFDBF7" stroke="#053C5E" stroke-width="2"/><text x="450" y="105" text-anchor="middle" class="kt-label">Policy</text>' +
          '<circle cx="630" cy="100" r="70" fill="#BFDBF7" stroke="#053C5E" stroke-width="2"/><text x="630" y="96" text-anchor="middle" class="kt-label">Implementation</text><text x="630" y="114" text-anchor="middle" class="kt-label">&amp; practice</text>' +
          '<circle cx="810" cy="100" r="70" fill="#BFDBF7" stroke="#053C5E" stroke-width="2"/><text x="810" y="96" text-anchor="middle" class="kt-label">Health</text><text x="810" y="114" text-anchor="middle" class="kt-label">impact</text>' +
          '<line x1="163" y1="100" x2="197" y2="100" stroke="#A31621" stroke-width="3" stroke-dasharray="6 6"/><text x="180" y="55" text-anchor="middle" class="kt-gap">gap</text>' +
          '<line x1="343" y1="100" x2="377" y2="100" stroke="#A31621" stroke-width="3" stroke-dasharray="6 6"/><text x="360" y="55" text-anchor="middle" class="kt-gap">gap</text>' +
          '<line x1="523" y1="100" x2="557" y2="100" stroke="#A31621" stroke-width="3" stroke-dasharray="6 6"/><text x="540" y="55" text-anchor="middle" class="kt-gap">gap</text>' +
          '<line x1="703" y1="100" x2="737" y2="100" stroke="#A31621" stroke-width="3" stroke-dasharray="6 6"/><text x="720" y="55" text-anchor="middle" class="kt-gap">gap</text>' +
          '</svg>' }
    ] },
  { id:'c2', group:'crisis', r:32, label:'Tuberculosis', summary:"Still the world's deadliest infectious disease — despite an existing vaccine and cure.",
    body:"Mycobacterium tuberculosis caused 1.25 million deaths in 2023, despite the existence of both a BCG vaccine and an effective antibiotic regimen. The same treatments produce very different outcomes depending on the region.", media:[] },
  { id:'c3', group:'crisis', r:30, label:'GSK, Shingrix & TB', summary:"A vaccine for TB or for shingles? GSK chose the wealthier market.",
    body:"GSK paused TB vaccine development to prioritize Shingrix, a shingles vaccine aimed largely at wealthy-country markets — both relying on a shared component over which GSK held IP and supply-chain control. TB vaccine progress only resumed after NGO investment stepped in.", media:[] },
  { id:'c4', group:'crisis', r:28, label:'One Health & AMR', summary:"Human health is intimately linked to the health of the environment we alter.",
    body:"Climate change and antimicrobial resistance intersect and compound one another as humans reshape the landscape — a relationship that will only intensify (van Bavel et al., 2024).", media:[] },
  { id:'c5', group:'crisis', r:30, label:'The Climate Crisis', summary:"Warming 10x faster than natural rates; 1.5°C already passed in 2025.",
    body:"3.6 billion people live in areas highly susceptible to climate change, and its impacts land unevenly — those who contributed least to the crisis are often hit hardest by it.", media:[] },
  { id:'c6', group:'crisis', r:26, label:'Sustainable Systems', summary:"Food, water, and energy systems all need redesigning, fast.",
    body:"An estimated 670 million people may face hunger by 2030 due to extreme weather. There's no long-term scenario where continued fossil fuel growth is compatible with the targets we need to hit.", media:[] },

  // RESPONSIBLE SCIENCE & ROLES
  { id:'r1', group:'responsible', r:54, label:'Designing Responsible Science', summary:"Collaboration, critical allyship, critical thinking, ethics, and sustainability all belong in the definition of good science.",
    body:"With public trust comes a duty to design science justly — for the people who will actually be impacted by it, not just the people funding or publishing it.", media:[] },
  { id:'r2', group:'responsible', r:32, label:'Critical Thinking & Reflexivity', summary:"Reasoned judgment turned outward on evidence — and inward on the researcher.",
    body:"Critical thinking is the systematic evaluation of evidence to form reasoned judgments, and it's core to scientific practice (Dowd et al., 2018). Reflexivity is that same scrutiny turned back on the researcher's own influence over what they're studying.", media:[] },
  { id:'r3', group:'responsible', r:30, label:'Data Integrity', summary:"P-hacking and selective reporting remain live risks under publish-or-perish pressure.",
    body:"Stopping data collection once p<0.05, reporting only the measures that clear that bar, or transforming data until it does — these practices persist under the pressure of prestige, and protecting against them is every scientist's responsibility, not just an editor's (Kearns & Roth).", media:[] },
  { id:'r4', group:'responsible', r:30, label:'Regulating AI & Gene Editing', summary:"Ethical frameworks exist — the harder question is enforcement.",
    body:"UNESCO's ethical AI principles cover privacy, accountability, and fairness. Gene editing raises its own questions of safety and consent — as in He Jiankui's imprisonment for editing embryos to resist HIV before those questions were settled.", media:[] },
  { id:'r5', group:'responsible', r:32, label:'Decolonizing Science & Data Sovereignty', summary:"OCAP®: Ownership, Control, Access, Possession.",
    body:"Decolonizing science means giving knowledge systems outside the colonial framework equal standing, not just inclusion. OCAP® — developed by the First Nations Information Governance Centre and used by groups like McGill's D2R — lets communities reclaim authority over their own data instead of being subject to \"parachute research.\"", media:[] },
  { id:'r6', group:'responsible', r:32, label:'Roles of a Scientist', summary:"Communicator, advocate, and diplomat are scientific roles too.",
    body:"Translating data for real audiences, engaging policymakers and the public directly, and building the partnerships that turn research into policy aren't distractions from \"real\" science — they're part of what makes science actually reach the people it's meant to serve.", media:[] },
  { id:'r7', group:'responsible', r:28, label:'Mis- and Disinformation', summary:"Misinformation gets facts wrong. Disinformation gets them wrong on purpose.",
    body:"\"It's an organized, well-financed, politically motivated campaign that's meant to tear down the fabric of science\" (Peter Hotez). Information flooding, conspiracy framing, synthetic media, and political denial all spread faster than most scientists are trained to counter.", media:[] },
];

const CATEGORY_MAP = {
  article:'read', editorial:'read', review:'read', declaration:'read', brief:'read',
  workshop:'read', project:'read', platform:'read', org:'read', quote:'read', note:'read',
  video:'watch',
  data:'data',
  book:'deeper',
};
const BUCKETS = [
  { key:'read',   label:'Read',       icon:'\u{1F4C4}' },
  { key:'watch',  label:'Watch',      icon:'\u{25B6}\u{FE0F}' },
  { key:'data',   label:'Data',       icon:'\u{1F4CA}' },
  { key:'deeper', label:'Go Deeper',  icon:'\u{1F4DA}' },
];
const MAX_VISIBLE = 4;

function mediaItemHtml(m){
  const icon = m.type === 'video' ? '\u{25B6}\u{FE0F}' : m.type === 'data' ? '\u{1F4CA}' : m.type === 'book' ? '\u{1F4DA}' : '\u{1F4C4}';
  const meta = [m.author, m.year].filter(Boolean).join(', ');
  return '<a class="media-item" href="' + m.url + '" target="_blank" rel="noopener">' +
    '<span class="m-icon">' + icon + '</span>' +
    '<span><span class="m-title">' + m.title + '</span>' +
    (meta ? '<div class="m-meta">' + meta + '</div>' : '') +
    '</span></a>';
}

function bucketHtml(bucketKey, label, icon, items, bucketIdx){
  if(!items.length) return '';
  const visible = items.slice(0, MAX_VISIBLE);
  const rest = items.slice(MAX_VISIBLE);
  let html = '<div class="bucket"><h3><span class="icon">' + icon + '</span>' + label + '</h3><div class="media-list" id="bucket-' + bucketIdx + '">';
  html += visible.map(mediaItemHtml).join('');
  if(rest.length){
    html += rest.map(m => '<div class="hidden-item" data-bucket="' + bucketIdx + '">' + mediaItemHtml(m) + '</div>').join('');
    html += '<button class="show-more" onclick="showMore(' + bucketIdx + ', this)">show ' + rest.length + ' more</button>';
  }
  html += '</div></div>';
  return html;
}

function showMore(bucketIdx, btn){
  document.querySelectorAll('.hidden-item[data-bucket="' + bucketIdx + '"]').forEach(el=>{
    el.style.display = 'block';
    el.classList.remove('hidden-item');
  });
  btn.remove();
}

const params = new URLSearchParams(window.location.search);
const id = params.get('id');
const d = LEAVES.find(x => x.id === id);
const content = document.getElementById('content');

if(!d){
  document.title = 'Topic Not Found — Science Without Borders';
  content.innerHTML = '<p class="notfound">No topic found for id "' + (id || '') + '". Go back to the map and click a bubble to get here.</p>';
} else {
  const g = GROUPS.find(g => g.id === d.group);
  document.title = d.label + ' \u2014 ' + g.name + ' \u2014 Science Without Borders';
  let mediaHtml = '<div class="media-empty">Nothing added here yet — this is the placeholder for id \'' + d.id + '\'. Add entries to that bubble\'s <code>media</code> array in the data (currently <code>media:[]</code>) to fill this in with articles, videos, data, or books.</div>';

  if(d.media && d.media.length){
    const primary = d.media.find(m => m.primary);
    const diagram = d.media.find(m => m.type === 'diagram');
    const rest = d.media.filter(m => !m.primary && m.type !== 'diagram');
    const grouped = { read:[], watch:[], data:[], deeper:[] };
    rest.forEach(m => { const cat = CATEGORY_MAP[m.type] || 'read'; grouped[cat].push(m); });

    let sections = '';
    if(primary){
      sections += '<div class="start-here"><div class="m-eyebrow">Start Here</div>' +
        '<a href="' + primary.url + '" target="_blank" rel="noopener" class="m-title" style="text-decoration:underline;">' + primary.title + '</a></div>';
    }
    if(diagram){
      sections += '<div class="bucket"><h3><span class="icon">\u{1F5FA}\uFE0F</span>Visual</h3>' +
        (diagram.caption ? '<p style="font-size:14px;color:var(--ink-soft);margin:0 0 14px;">' + diagram.caption + '</p>' : '') +
        '<div class="diagram-box">' + diagram.svg + '</div></div>';
    }
    BUCKETS.forEach((b, i) => { sections += bucketHtml(b.key, b.label, b.icon, grouped[b.key], i); });
    mediaHtml = sections;
  }

  content.innerHTML =
    '<span class="tag" style="background:' + g.color + '">' + g.name + '</span>' +
    '<h1>' + d.label + '</h1>' +
    '<p class="summary">' + d.summary + '</p>' +
    '<p class="body-text">' + d.body + '</p>' +
